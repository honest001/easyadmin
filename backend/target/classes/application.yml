spring:
  # 数据源配置
  datasource:
    url: jdbc:mysql://localhost:3306/easyadmin?useUnicode=true&characterEncoding=utf8&useSSL=false
    username: root
    password: root123456
    driver-class-name: com.mysql.cj.jdbc.Driver
  # Redis配置
  redis:
    host: localhost
    port: 6379
    password:
    database: 0
  # 配置文件上传
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 100MB

# 服务器配置
server:
  port: 8081
  servlet:
    context-path: /

# MyBatis-Plus配置
mybatis-plus:
  mapper-locations: classpath*:mapper/**/*.xml
  type-aliases-package: com.easyadmin.module.*.entity
  configuration:
    map-underscore-to-camel-case: true

# 日志配置
logging:
  level:
    com.easyadmin: debug
    root: info
  pattern:
    console: '%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n'
